name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev
      - api-cached-server
    paths-ignore:
      - '**.md'
      - 'docs/**'
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Login to GHCR ----
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Login to Docker Hub ----
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')

          echo "image_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "ghcr=ghcr.io/$REPO_OWNER/$REPO_NAME" >> $GITHUB_OUTPUT
          echo "dockerhub=${{ secrets.DOCKERHUB_USERNAME }}/$REPO_NAME" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.ref_name }}"
            TAG=$(echo "$TAG" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | sed 's/[^a-z0-9._-]//g')
            [ -z "$TAG" ] && TAG="unknown"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Build and push to GHCR and Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.ghcr }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.dockerhub }}:${{ steps.meta.outputs.tag }}
